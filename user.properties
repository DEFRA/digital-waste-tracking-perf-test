# Loaded for test runs and report generation (entrypoint.sh: -q user.properties on jmeter -n and jmeter -g).
# Must be the property name "sample_variables" (not jmeter.save.saveservice.*) — see org.apache.jmeter.samplers.SampleEvent.
sample_variables=bulkMovementsInRequest,bulkMovementsCumulativeTotal,bulkMovementsPerSecond

# Time bucket for over-time graphs (ms). 60000 = one bucket per minute (JMeter default).
jmeter.reportgenerator.overall_granularity=60000

# Bulk upload metrics: graphs appear under "Custom Graphs" in index.html when JTL columns are present.

# Cumulative movements sent so far (increases each sample; shared total across all threads).
jmeter.reportgenerator.graph.custom_bulk_movements_cumulative.classname=org.apache.jmeter.report.processor.graph.impl.CustomGraphConsumer
jmeter.reportgenerator.graph.custom_bulk_movements_cumulative.title=Cumulative bulk movements sent (test total)
jmeter.reportgenerator.graph.custom_bulk_movements_cumulative.property.set_Y_Axis=Cumulative movements
jmeter.reportgenerator.graph.custom_bulk_movements_cumulative.property.set_X_Axis=Over Time
jmeter.reportgenerator.graph.custom_bulk_movements_cumulative.property.set_granularity=${jmeter.reportgenerator.overall_granularity}
jmeter.reportgenerator.graph.custom_bulk_movements_cumulative.property.setSampleVariableName=bulkMovementsCumulativeTotal
jmeter.reportgenerator.graph.custom_bulk_movements_cumulative.property.setContentMessage=Cumulative total:

# Mean bulk movement count per HTTP sample, per time bucket (flat when bulkMovementCount is fixed).
jmeter.reportgenerator.graph.custom_bulk_movements_count.classname=org.apache.jmeter.report.processor.graph.impl.CustomGraphConsumer
jmeter.reportgenerator.graph.custom_bulk_movements_count.title=Bulk movements per HTTP request (batch size)
jmeter.reportgenerator.graph.custom_bulk_movements_count.property.set_Y_Axis=Movements in this request (mean per bucket)
jmeter.reportgenerator.graph.custom_bulk_movements_count.property.set_X_Axis=Over Time
jmeter.reportgenerator.graph.custom_bulk_movements_count.property.set_granularity=${jmeter.reportgenerator.overall_granularity}
jmeter.reportgenerator.graph.custom_bulk_movements_count.property.setSampleVariableName=bulkMovementsInRequest
jmeter.reportgenerator.graph.custom_bulk_movements_count.property.setContentMessage=Movements in request:

# Estimated movements per second for each sample: movements / (response time in seconds).
# Uses mean per time bucket; useful as a throughput-style view for the bulk endpoint.
jmeter.reportgenerator.graph.custom_bulk_movements_per_sec.classname=org.apache.jmeter.report.processor.graph.impl.CustomGraphConsumer
jmeter.reportgenerator.graph.custom_bulk_movements_per_sec.title=Estimated bulk movements per second (movements / response time)
jmeter.reportgenerator.graph.custom_bulk_movements_per_sec.property.set_Y_Axis=Movements per second (mean per bucket)
jmeter.reportgenerator.graph.custom_bulk_movements_per_sec.property.set_X_Axis=Over Time
jmeter.reportgenerator.graph.custom_bulk_movements_per_sec.property.set_granularity=${jmeter.reportgenerator.overall_granularity}
jmeter.reportgenerator.graph.custom_bulk_movements_per_sec.property.setSampleVariableName=bulkMovementsPerSecond
jmeter.reportgenerator.graph.custom_bulk_movements_per_sec.property.setContentMessage=Estimated movements/s:
